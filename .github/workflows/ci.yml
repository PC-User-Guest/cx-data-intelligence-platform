name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  contract-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install --global newman

      - name: Run contract checks
        run: |
          python scripts/mock_ticket_api.py --host 127.0.0.1 --port 9000 &
          MOCK_PID=$!
          trap "kill ${MOCK_PID}" EXIT

          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:9000/api/tickets > /dev/null; then
              break
            fi
            sleep 1
          done

          newman run postman/live_ticket_api.postman_collection.json \
            --env-var ticketsApiUrl=http://127.0.0.1:9000/api/tickets \
            --bail

  compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run compliance checks
        run: python scripts/compliance_check.py --output compliance_report.json

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance_report.json

  synthetic-load:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run synthetic load suite
        run: python scripts/synthetic_load_test.py --output synthetic_load_report.json

      - name: Upload load report
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-load-report
          path: synthetic_load_report.json
